name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-remote
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: claude-remote/go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: build
        run: go build -trimpath ./...

  ansible:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ansible + ansible-lint
        run: pip install ansible ansible-lint
      - name: Install required collections
        run: ansible-galaxy collection install community.general ansible.posix
      - name: ansible-lint
        run: ansible-lint roles/devbox/
      - name: syntax check
        run: ansible-playbook -i inventory.example.yml devbox.yml --syntax-check
